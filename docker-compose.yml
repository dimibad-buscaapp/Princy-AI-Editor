services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  frontend:
    build: .
    command: npm run start -w @princy/frontend
    env_file:
      - .env
    ports:
      - "3400:3400"

  api:
    build: .
    command: npm run start -w @princy/api
    env_file:
      - .env
    ports:
      - "3401:3401"

  agents:
    build: .
    command: npm run start -w @princy/agents
    env_file:
      - .env
    ports:
      - "3402:3402"

  workspace-service:
    build: .
    command: npm run start -w @princy/workspace-service
    env_file:
      - .env
    ports:
      - "3403:3403"

  context-graph:
    build: .
    command: npm run start -w @princy/context-graph
    env_file:
      - .env
    ports:
      - "3404:3404"

  memory-service:
    build: .
    command: npm run start -w @princy/memory-service
    env_file:
      - .env
    ports:
      - "3405:3405"

  automation-service:
    build: .
    command: npm run start -w @princy/automation-service
    env_file:
      - .env
    ports:
      - "3406:3406"

  gateway:
    build: .
    command: npm run start -w @princy/gateway
    env_file:
      - .env
    ports:
      - "3407:3407"

  mcp-server:
    build: .
    command: npm run start -w @princy/mcp-server
    env_file:
      - .env
    ports:
      - "3408:3408"

volumes:
  redis_data:
