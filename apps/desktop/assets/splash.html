<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Princy Code</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(145deg, #0a0518 0%, #1a0b3d 55%, #0d1f3c 100%);
      color: #e8f4ff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      user-select: none;
      -webkit-app-region: drag;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #00f2ff, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p.subtitle {
      font-size: 13px;
      opacity: 0.85;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    p.status {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
      min-height: 18px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(0, 242, 255, 0.2);
      border-top-color: #00f2ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Princy Code</h1>
  <p class="subtitle">AI Development Environment</p>
  <div class="spinner" aria-hidden="true"></div>
  <p class="status" id="status">Iniciando...</p>
  <script>
    window.setSplashStatus = function (text) {
      var el = document.getElementById("status");
      if (el) el.textContent = text;
    };
  </script>
</body>
</html>
